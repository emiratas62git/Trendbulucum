name: Weekly AI Trend Report Automation

on:
  schedule:
    # Run at 08:00 UTC every Monday
    - cron: '0 8 * * 1'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  generate-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate AI Report and Send Emails
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_URL: "https://trendyfinderpro.com"
        run: node scripts/generate_weekly_ai_report.js

      - name: Commit and Push new Blog Post to Repository
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/blogPosts.js
          git add public/blog-images/
          git commit -m "Auto-generated: Weekly AI Report" || echo "No changes to commit"
          git push
